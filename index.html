<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenVPN Config Generator</title>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="padding: 20px; color: red; font-family: sans-serif;">' +
            '<h1>Script Error</h1>' +
            '<p>' + msg + '</p>' +
            '<pre style="background: #eee; padding: 10px; border-radius: 4px;">' +
            'URL: ' + url + '\nLine: ' + line + '\nCol: ' + col +
            '</pre>' +
            '</div>';
        }
        return false;
      };
    </script>
  </head>
  <body>
    <div id="root">
      <div style="font-family: sans-serif; padding: 20px; text-align: center;">
        <p>Loading OpenVPN Config Generator...</p>
        <p style="font-size: 12px; color: #666;">If this message persists, please check your browser console for errors.</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx" onerror="document.getElementById('root').innerHTML = '<div style=\'padding: 20px; color: red;\'><h1>Network Error</h1><p>Failed to load the main script. Please check your internet connection or deployment settings.</p></div>'"></script>
  </body>
</html>
